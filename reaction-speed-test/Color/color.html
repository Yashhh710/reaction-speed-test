<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Color Switch Reflex - Anime Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-w: #ff0055; /* Magenta/Red - Fire */
            --color-a: #00f2ff; /* Cyan - Ice/Water */
            --color-s: #00ff88; /* Green - Vitality */
            --color-d: #ffee00; /* Yellow - Electric */
            --bg-deep: #020205;
            --glass: rgba(255, 255, 255, 0.03);
            --glow-blur: 2vw;
        }

        * { margin:0; padding:0; box-sizing:border-box; cursor: crosshair; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex; justify-content: center; align-items: center;
            -webkit-text-size-adjust: 100%;
        }

        /* --- ANIME BACKGROUND EFFECTS --- */
        #energy-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #020205 100%);
        }
        .energy-wave {
            position: absolute; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 242, 255, 0.02) 3px);
            animation: scanline 10s linear infinite;
        }
        @keyframes scanline { from { background-position: 0 0; } to { background-position: 0 100%; } }

        .speed-lines {
            position: absolute; inset: 0; 
            background: repeating-conic-gradient(from 0deg, transparent 0deg 2deg, rgba(255,255,255,0.03) 3deg 5deg);
            opacity: 0; pointer-events: none; transition: 0.2s;
            mask-image: radial-gradient(circle at center, transparent 30%, black 100%);
        }
        .speed-lines.active { opacity: 1; animation: speed-spin 0.2s linear infinite; }
        @keyframes speed-spin { from { transform: rotate(0deg) scale(1.1); } to { transform: rotate(360deg) scale(1.2); } }

        /* --- TOP HUD --- */
        .hud-top {
            position: absolute; top: 4vh; left: 50%; transform: translateX(-50%);
            display: flex; gap: 4vw; align-items: center; z-index: 100;
        }
        .hud-stat { text-align: center; }
        .stat-label { font-size: 0.75vw; color: rgba(255,255,255,0.4); text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 2vw; color: #fff; text-shadow: 0 0 1vw rgba(255,255,255,0.3); }
        .stat-value.highlight { color: var(--color-a); text-shadow: 0 0 1.5vw var(--color-a); }

        /* --- COMBO METER --- */
        .combo-container {
            position: absolute; right: 4vw; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 1vh;
        }
        .combo-text { font-family: 'Orbitron', sans-serif; font-size: 4vw; font-weight: 900; -webkit-text-stroke: 1px rgba(255,255,255,0.1); }
        .combo-bar-outer { width: 1vh; height: 30vh; background: rgba(255,255,255,0.05); border-radius: 5px; position: relative; overflow: hidden; }
        .combo-bar-fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(0deg, var(--color-a), var(--color-w)); transition: 0.3s; }

        /* --- CENTRAL STAGE --- */
        .stage-container {
            width: 50vw; height: 50vw; max-width: 60vh; max-height: 60vh;
            border: 2px solid rgba(255,255,255,0.05); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            position: relative; backdrop-filter: blur(5px);
            background: radial-gradient(circle at center, rgba(255,255,255,0.02) 0%, transparent 70%);
        }

        .flash-orb {
            width: 60%; height: 60%; border-radius: 50%;
            background: #111; border: 4px solid rgba(255,255,255,0.1);
            transition: 0.05s linear; position: relative;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 5vh rgba(0,0,0,0.8);
        }
        .flash-orb::after {
            content: ""; position: absolute; inset: -1vw; border-radius: 50%;
            border: 2px dashed rgba(255,255,255,0.1); animation: rotate-dashed 10s linear infinite;
        }
        @keyframes rotate-dashed { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- CONTROL HINTS --- */
        .controls-overlay {
            position: absolute; bottom: 6vh; left: 50%; transform: translateX(-50%);
            display: flex; gap: 2vw; z-index: 100;
        }
        .key-hint {
            width: 4.5vw; height: 4.5vw; border: 2px solid rgba(255,255,255,0.1);
            background: var(--glass); border-radius: 1vw;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif; font-size: 1.5vw; font-weight: 900;
            transition: 0.2s; position: relative;
        }
        .key-hint::before {
            content: attr(data-label); position: absolute; top: -2.5vh;
            font-size: 0.6vw; opacity: 0.6; color: #fff;
        }
        .key-hint.k1 { border-color: var(--color-w); color: var(--color-w); }
        .key-hint.k2 { border-color: var(--color-a); color: var(--color-a); }
        .key-hint.k3 { border-color: var(--color-s); color: var(--color-s); }
        .key-hint.k4 { border-color: var(--color-d); color: var(--color-d); }

        .key-hint.active { transform: scale(1.1); box-shadow: 0 0 3vw currentColor; background: currentColor; color: #000; }

        /* --- OVERLAYS --- */
        #start-overlay, #fail-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        .title-text { font-family: 'Orbitron', sans-serif; font-size: 5vw; font-weight: 900; color: var(--color-a); margin-bottom: 2vh; text-shadow: 0 0 2vw var(--color-a); }
        .btn-action {
            padding: 2vh 5vw; font-family: 'Orbitron', sans-serif; font-size: 1.8vw; font-weight: 900;
            background: #fff; color: #000; border: none; cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s;
        }
        .btn-action:hover { transform: scale(1.1); box-shadow: 0 0 4vw #fff; }

        /* --- IMPACT FRAMES --- */
        #impact-frame {
            position: fixed; inset: 0; background: #fff; z-index: 500;
            opacity: 0; pointer-events: none;
        }
        .flash-hit { animation: flash-white 0.1s linear; }
        @keyframes flash-white { 0% { opacity: 1; } 100% { opacity: 0; } }

        .shake { animation: shake-screen 0.2s linear 2; }
        @keyframes shake-screen { 0% { transform: translate(0,0); } 25% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } 75% { transform: translate(5px, -5px); } 100% { transform: translate(0,0); } }

        /* Mobile Controls */
        .mobile-btns { display: none; position: absolute; inset: 0; z-index: 200; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        .m-btn { width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        @media (max-width: 768px) {
            .mobile-btns { display: grid; }
            .controls-overlay { width: 90vw; justify-content: space-between; gap: 5vw; }
            .key-hint { width: 18vw; height: 18vw; font-size: 5vw; }
            .title-text { font-size: 8vw; }
            .btn-action { font-size: 5vw; }
            .hud-top { gap: 10vw; }
            .stat-value { font-size: 6vw; }
        }

        /* --- BACK BUTTON --- */
        .f1-back-btn {
            position: absolute; top: 3vh; right: 3vw;
            padding: 1vh 3vw; background: #000; border: 0.3vmin solid var(--color-a);
            color: var(--color-a); font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.2vw;
            text-transform: uppercase; cursor: pointer; z-index: 2000;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%); transition: 0.3s;
            text-decoration: none; display: flex; align-items: center; gap: 1vw;
        }
        .f1-back-btn:hover { background: var(--color-a); color: #000; box-shadow: 0 0 4vmin var(--color-a); transform: scale(1.05); }

    </style>
</head>
<body>

    <div id="energy-bg"><div class="energy-wave"></div></div>
    <div id="speed-overlay" class="speed-lines"></div>
    <div id="impact-frame"></div>

    <a href="../../index.html" class="f1-back-btn">Exit</a>

    <!-- START OVERLAY -->
    <div id="start-overlay">
        <div class="title-text">PULSE SWITCH</div>
        <div style="color: #aaa; margin-bottom: 4vh; text-align: center; line-height: 1.6;">
            MATCH THE FLASH TO THE KEY<br>
            <span style="color:var(--color-w)">1 = RED</span> | <span style="color:var(--color-a)">2 = BLUE</span> | <span style="color:var(--color-s)">3 = GREEN</span> | <span style="color:var(--color-d)">4 = YELLOW</span>
        </div>
        <button id="startGameBtn" class="btn-action">LIMIT BREAK</button>
    </div>

    <!-- FAIL OVERLAY -->
    <div id="fail-overlay" style="display:none;">
        <div class="title-text" style="color: var(--color-w); text-shadow: 0 0 2vw var(--color-w);">CORE FAILURE</div>
        <div id="finalScore" class="stat-value" style="margin-bottom: 4vh;">0000</div>
        <button id="retryGameBtn" class="btn-action">REBOOT SYSTEM</button>
    </div>

    <!-- HUD -->
    <div class="hud-top">
        <div class="hud-stat">
            <div class="stat-label">Best Reflex</div>
            <div id="bestReflex" class="stat-value highlight">000ms</div>
        </div>
        <div class="hud-stat">
            <div class="stat-label">Total Score</div>
            <div id="scoreVal" class="stat-value">0000</div>
        </div>
        <div class="hud-stat">
            <div class="stat-label">Last React</div>
            <div id="lastReact" class="stat-value">000ms</div>
        </div>
    </div>

    <div class="combo-container">
        <div id="comboVal" class="combo-text">0X</div>
        <div class="combo-bar-outer"><div id="comboFill" class="combo-bar-fill"></div></div>
        <div class="stat-label">COMBO</div>
    </div>

    <!-- MAIN GAME -->
    <div class="stage-container">
        <div id="orb" class="flash-orb">
            <div id="orb-inner" style="width: 100%; height: 100%; border-radius: 50%; opacity: 0; transition: 0.02s;"></div>
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls-overlay">
        <div class="key-hint k1" data-label="STRIKE">1</div>
        <div class="key-hint k2" data-label="SPEED">2</div>
        <div class="key-hint k3" data-label="GUARD">3</div>
        <div class="key-hint k4" data-label="SHOCK">4</div>
    </div>

    <!-- MOBILE INPUTS -->
    <div class="mobile-btns">
        <div class="m-btn" data-key="1"></div>
        <div class="m-btn" data-key="2"></div>
        <div class="m-btn" data-key="3"></div>
        <div class="m-btn" data-key="4"></div>
    </div>

    <script>
        // --- AUDIO SYSTEM ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, dur, type='sine') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        // --- PREVENT BROWSER ZOOM ---
        document.addEventListener('keydown', function (e) {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
                e.preventDefault();
            }
        });
        document.addEventListener('wheel', function (e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        // DOM
        const scoreEl = document.getElementById('scoreVal');
        const stage = document.getElementById('stage');
        const bestEl = document.getElementById('bestReflex');
        const reactEl = document.getElementById('lastReact');
        const comboEl = document.getElementById('comboVal');
        const comboFill = document.getElementById('comboFill');
        const orb = document.getElementById('orb');
        const orbInner = document.getElementById('orb-inner');
        const impact = document.getElementById('impact-frame');
        const speedOverlay = document.getElementById('speed-overlay');

        let isPlaying = false;
        let score = 0;
        let bestReflex = parseInt(localStorage.getItem('animePulseBest')) || 999;
        let combo = 0;
        let currentTarget = null;
        let flashTime = 0;
        let gameLoop = null;
        let difficulty = 2000; // ms between flashes

        const keyMap = {
            '1': { color: '#ff0055', glow: 'var(--color-w)', class: 'k1' },
            '2': { color: '#00f2ff', glow: 'var(--color-a)', class: 'k2' },
            '3': { color: '#00ff88', glow: 'var(--color-s)', class: 'k3' },
            '4': { color: '#ffee00', glow: 'var(--color-d)', class: 'k4' }
        };

        if(bestReflex < 999) bestEl.innerText = bestReflex + 'ms';

        function initGame() {
            score = 0; combo = 0; difficulty = 2000;
            updateHUD();
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('fail-overlay').style.display = 'none';
            isPlaying = true;
            scheduleFlash();
        }

        function scheduleFlash() {
            if(!isPlaying) return;
            const delay = 800 + Math.random() * difficulty;
            gameLoop = setTimeout(triggerFlash, delay);
        }

        function triggerFlash() {
            if(!isPlaying) return;
            const keys = Object.keys(keyMap);
            currentTarget = keys[Math.floor(Math.random() * keys.length)];
            
            const cfg = keyMap[currentTarget];
            orbInner.style.background = cfg.color;
            orbInner.style.opacity = '1';
            orb.style.boxShadow = `0 0 8vh ${cfg.color}, 0 0 15vh ${cfg.color}`;
            
            flashTime = performance.now();
            playTone(880, 0.1, 'triangle'); // Flash sound
        }

        function handleInput(key) {
            if(!isPlaying || !currentTarget) {
                if(!isPlaying) return;
                gameOver(); // Punish early hits
                return;
            }

            const k = key.toLowerCase();
            if(!keyMap[k]) return;

            // Highlight hint
            const hint = document.querySelector('.key-hint.' + keyMap[k].class);
            hint.classList.add('active');
            setTimeout(() => hint.classList.remove('active'), 100);

            if(k === currentTarget) {
                // SUCCESS
                const react = Math.floor(performance.now() - flashTime);
                score += (100 + (combo * 10));
                combo++;
                
                reactEl.innerText = react + 'ms';
                if(react < bestReflex) {
                    bestReflex = react;
                    localStorage.setItem('animePulseBest', bestReflex);
                    bestEl.innerText = bestReflex + 'ms';
                }

                // Effects
                orbInner.style.opacity = '0';
                orb.style.boxShadow = 'none';
                playTone(1200, 0.2, 'sine');
                
                if(react < 250) { // Perfect!
                    impact.classList.add('flash-hit');
                    setTimeout(() => impact.classList.remove('flash-hit'), 100);
                }

                if(combo > 5) speedOverlay.classList.add('active');
                
                currentTarget = null;
                difficulty = Math.max(500, 2000 - (score / 10)); // Speed up
                updateHUD();
                scheduleFlash();
            } else {
                gameOver();
            }
        }

        function gameOver() {
            isPlaying = false;
            clearTimeout(gameLoop);
            playTone(100, 0.5, 'sawtooth');
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 400);
            
            speedOverlay.classList.remove('active');
            document.getElementById('fail-overlay').style.display = 'flex';
            document.getElementById('finalScore').innerText = score;
        }

        function updateHUD() {
            scoreEl.innerText = score.toString().padStart(4, '0');
            comboEl.innerText = combo + 'X';
            const f = Math.min(100, combo * 10);
            comboFill.style.height = f + '%';
        }

        // Input Listeners
        document.addEventListener('keydown', (e) => {
            if(isPlaying) handleInput(e.key);
        });

        document.querySelectorAll('.m-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleInput(btn.dataset.key);
            });
            btn.addEventListener('mousedown', () => handleInput(btn.dataset.key));
        });

        document.getElementById('startGameBtn').addEventListener('click', initGame);
        document.getElementById('retryGameBtn').addEventListener('click', initGame);

    </script>
</body>
</html>
