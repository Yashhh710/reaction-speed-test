<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MOLE SMASH | Classic Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --grass: #7dc045;
            --dirt: #5c4033;
            --dirt-dark: #3e2b22;
            --mole: #8b5a2b;
            --ui-bg: #fdf5e6;
            --accent: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            cursor: none; /* Hide default cursor */
        }

        /* --- CUSTOM HAMMER CURSOR --- */
        #hammer {
            position: fixed;
            width: 80px;
            height: 80px;
            pointer-events: none;
            z-index: 9999;
            transform-origin: center center;
            transition: transform 0.05s ease;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.4));
            display: none;
        }

        .hammer-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform: rotate(45deg); /* Natural holding angle */
        }

        .hammer-head {
            width: 50px;
            height: 30px;
            background: linear-gradient(135deg, #8b4513 0%, #5c2e0b 100%);
            border: 3px solid #3e1f07;
            border-radius: 6px;
            position: absolute;
            top: 10px;
            left: 20px;
            box-shadow: inset 0 4px 6px rgba(255,255,255,0.1);
        }

        .hammer-handle {
            width: 12px;
            height: 50px;
            background: linear-gradient(to right, #d2b48c, #a68d60);
            border: 2px solid #8b4513;
            border-radius: 0 0 6px 6px;
            position: absolute;
            top: 35px; /* Adjust to connect to head */
            left: 39px;
            z-index: -1;
        }

        #hammer.whack {
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            transform: scale(1.1) rotate(-45deg) !important;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            background-color: var(--grass);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--dirt);
            -webkit-text-size-adjust: 100%;
        }

        /* --- UI HEADER --- */
        .header {
            background: var(--ui-bg);
            padding: 2vh 4vw;
            border-radius: 20px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            display: flex;
            gap: 3vw;
            margin-bottom: 5vh;
            border: 4px solid var(--dirt);
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.6;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
        }

        /* --- GAME BOARD --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            background: rgba(0,0,0,0.05);
            padding: 20px;
            border-radius: 30px;
            max-width: 95vw;
        }

        .hole {
            width: 120px;
            height: 120px;
            background: var(--dirt-dark);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
            border-bottom: 8px solid rgba(255,255,255,0.05);
        }

        .mole {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 100%; /* Hidden below */
            left: 0;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mole.up {
            transform: translateY(-90%);
        }

        .mole-body {
            width: 80%;
            height: 90%;
            background: var(--mole);
            border-radius: 50% 50% 20% 20%;
            position: relative;
            border: 4px solid var(--dirt-dark);
        }

        /* Mole Face */
        .mole-body::after {
            content: "•  •";
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            letter-spacing: 5px;
        }

        .mole-nose {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 10px;
            background: #ff9999;
            border-radius: 50%;
        }

        /* --- CONTROLS --- */
        .controls {
            margin-top: 5vh;
            display: flex;
            gap: 20px;
        }

        button {
            padding: 1.5vh 3vw;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 50px;
            border: 4px solid var(--dirt);
            cursor: pointer;
            background: var(--ui-bg);
            color: var(--dirt);
            box-shadow: 0 6px 0 var(--dirt);
            transition: 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--dirt);
        }

        button.start { background: var(--accent); color: #fff; border-color: #8b3a3a; box-shadow: 0 6px 0 #8b3a3a; }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 0.9rem;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-weight: 700;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 500px) {
            .hole { width: 90px; height: 90px; }
            .grid { gap: 10px; }
            .header { gap: 6vw; padding: 1.5vh 5vw; }
            .stat-value { font-size: 1.5rem; }
        }

        /* --- EFFECTS --- */
        .hit-effect {
            animation: bounce 0.3s ease;
        }

        @keyframes bounce {
            0% { transform: translateY(-90%) scale(1); }
            50% { transform: translateY(-70%) scale(1.1); }
            100% { transform: translateY(-100%) scale(0); }
        }
    </style>
</head>
<body>

    <a href="../../index.html" class="back-btn">← HUB</a>

    <div id="hammer">
        <div class="hammer-inner">
            <div class="hammer-head"></div>
            <div class="hammer-handle"></div>
        </div>
    </div>

    <div class="header">
        <div class="stat">
            <div class="stat-label">Score</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Time</div>
            <div id="timer" class="stat-value">30</div>
        </div>
        <div class="stat">
            <div class="stat-label">Best</div>
            <div id="best" class="stat-value">0</div>
        </div>
    </div>

    <div class="grid" id="grid">
        <!-- 9 holes generated via JS -->
    </div>

    <div class="controls">
        <button id="start-btn" class="start">START GAME</button>
    </div>

    <script>
        // --- PREVENT BROWSER ZOOM ---
        document.addEventListener('keydown', function (e) {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
                e.preventDefault();
            }
        });
        document.addEventListener('wheel', function (e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        const grid = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const bestEl = document.getElementById('best');
        const startBtn = document.getElementById('start-btn');

        let score = 0;
        let timeLeft = 30;
        let lastHole;
        let gameActive = false;
        let bestScore = localStorage.getItem('moleBest') || 0;
        bestEl.textContent = bestScore;

        // Create Grid
        for(let i=0; i<9; i++) {
            const hole = document.createElement('div');
            hole.className = 'hole';
            const mole = document.createElement('div');
            mole.className = 'mole';
            mole.innerHTML = '<div class="mole-body"><div class="mole-nose"></div></div>';
            mole.addEventListener('click', whack);
            hole.appendChild(mole);
            grid.appendChild(hole);
        }

        const moles = document.querySelectorAll('.mole');

        // --- AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, dur) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(moles) {
            const idx = Math.floor(Math.random() * moles.length);
            const hole = moles[idx];
            if (hole === lastHole) return randomHole(moles);
            lastHole = hole;
            return hole;
        }

        function peep() {
            if (!gameActive) return;
            const time = randomTime(600, 1200) - (score * 5); // Faster as score goes up
            const mole = randomHole(moles);
            mole.classList.add('up');
            playSound(400, 0.1); // "Pop"

            setTimeout(() => {
                mole.classList.remove('up');
                if (gameActive) peep();
            }, Math.max(time, 400));
        }

        function startGame() {
            if (gameActive) return;
            score = 0;
            timeLeft = 30;
            scoreEl.textContent = 0;
            timerEl.textContent = 30;
            gameActive = true;
            startBtn.style.opacity = '0.5';
            startBtn.textContent = 'WHACKING!';
            
            peep();
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    endGame();
                }
            }, 1000);
        }

        function whack(e) {
            if (!e.isTrusted || !this.classList.contains('up')) return;
            score++;
            this.classList.remove('up');
            this.classList.add('hit-effect'); // Optional visual
            setTimeout(() => this.classList.remove('hit-effect'), 300);
            
            scoreEl.textContent = score;
            playSound(800, 0.05); // "Tap"
        }

        function endGame() {
            gameActive = false;
            startBtn.style.opacity = '1';
            startBtn.textContent = 'PLAY AGAIN';
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('moleBest', bestScore);
                bestEl.textContent = bestScore;
            }
            alert('GAME OVER! Score: ' + score);
        }

        startBtn.addEventListener('click', startGame);

        // --- HAMMER CURSOR LOGIC ---
        const hammer = document.getElementById('hammer');
        
        window.addEventListener('mousemove', (e) => {
            hammer.style.display = 'block';
            hammer.style.left = (e.clientX - 45) + 'px';
            hammer.style.top = (e.clientY - 25) + 'px';
        });

        window.addEventListener('mousedown', () => {
            hammer.classList.add('whack');
            playSound(200, 0.05); // "Whosh/Swing" sound
        });

        window.addEventListener('mouseup', () => {
            hammer.classList.remove('whack');
        });

        // Ensure buttons still show pointer (though we handle cursor: none on body)
        const buttons = document.querySelectorAll('button, .back-btn');
        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => hammer.style.opacity = '0.7');
            btn.addEventListener('mouseleave', () => hammer.style.opacity = '1');
        });

    </script>
</body>
</html>
